  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-500: hsl(223, 87%, 63%);
      --blue-200: hsl(223, 100%, 88%);
      --red-400: hsl(354, 100%, 66%);
      --gray-400: hsl(0, 0%, 59%);
      --blue-950: hsl(209, 33%, 12%);
      --white: #ffffff;
    }

    body {
      font-family: 'Libre Franklin', sans-serif;
      font-size: 20px;
      font-weight: 300;
      color: var(--blue-950);
      background: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── MAIN LAYOUT ── */
    .page-wrapper {
      width: 100%;
      max-width: 640px;
      padding: 4rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    /* ── LOGO ── */
    .logo {
      margin-bottom: 2.5rem;
    }
    .logo svg {
      display: block;
    }

    /* ── HEADING ── */
    h1 {
      font-size: clamp(1.4rem, 4vw, 2.5rem);
      font-weight: 300;
      color: var(--gray-400);
      text-align: center;
      margin-bottom: 1rem;
      letter-spacing: 0.01em;
    }
    h1 strong {
      font-weight: 700;
      color: var(--blue-950);
    }

    /* ── SUBTITLE ── */
    .subtitle {
      font-size: 1rem;
      color: var(--blue-950);
      text-align: center;
      margin-bottom: 2rem;
    }

    /* ── FORM ── */
    .form-wrapper {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 0.25rem;
    }

    .input-group {
      position: relative;
      flex: 1;
    }

    .email-input {
      width: 100%;
      padding: 0.85rem 1.75rem;
      border: 1px solid var(--blue-200);
      border-radius: 50px;
      font-family: inherit;
      font-size: 0.8rem;
      color: var(--blue-950);
      outline: none;
      transition: border-color 0.2s;
    }
    .email-input::placeholder {
      color: var(--blue-200);
    }
    .email-input:focus {
      border-color: var(--blue-500);
    }
    .email-input.error {
      border-color: var(--red-400);
    }

    .error-msg {
      display: none;
      font-size: 0.65rem;
      font-style: italic;
      color: var(--red-400);
      text-align: center;
      margin-top: 0.4rem;
      padding-left: 1.75rem;
    }
    .error-msg.visible {
      display: block;
    }

    .notify-btn {
      width: 100%;
      padding: 0.85rem 2rem;
      background: var(--blue-500);
      color: var(--white);
      border: none;
      border-radius: 50px;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 20px hsla(223, 87%, 63%, 0.4);
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    }
    .notify-btn:hover {
      background: hsl(223, 87%, 72%);
      box-shadow: 0 8px 28px hsla(223, 87%, 63%, 0.5);
    }
    .notify-btn:active {
      transform: scale(0.98);
    }
    .notify-btn:focus-visible {
      outline: 2px solid var(--blue-500);
      outline-offset: 3px;
    }

    /* ── ILLUSTRATION ── */
    .illustration {
      width: 100%;
      max-width: 640px;
      margin-top: 4rem;
      filter: drop-shadow(0 20px 40px hsla(223, 50%, 40%, 0.15));
    }
    .illustration img {
      width: 100%;
      display: block;
    }

    /* ── FOOTER ── */
    footer {
      width: 100%;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
    }

    .social-links {
      display: flex;
      gap: 0.75rem;
    }

    .social-link {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--blue-200);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--blue-500);
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .social-link:hover {
      background: var(--blue-500);
      border-color: var(--blue-500);
      color: var(--white);
    }
    .social-link:focus-visible {
      outline: 2px solid var(--blue-500);
      outline-offset: 3px;
    }
    .social-link svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .copyright {
      font-size: 0.65rem;
      color: var(--gray-400);
    }

    /* ── DESKTOP LAYOUT ── */
    @media (min-width: 600px) {
      .form-wrapper {
        flex-direction: row;
        align-items: flex-start;
      }
      .input-group {
        flex: 1;
      }
      .error-msg {
        text-align: left;
        padding-left: 1.75rem;
      }
      .notify-btn {
        width: auto;
        min-width: 180px;
        flex-shrink: 0;
      }
    }
  </style>
</head>

  <script>
    const form = document.getElementById('notify-form');
    const emailInput = document.getElementById('email');
    const errorMsg = document.getElementById('error-msg');

    function showError(msg) {
      emailInput.classList.add('error');
      errorMsg.textContent = msg;
      errorMsg.classList.add('visible');
    }

    function clearError() {
      emailInput.classList.remove('error');
      errorMsg.textContent = '';
      errorMsg.classList.remove('visible');
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const val = emailInput.value.trim();

      if (!val) {
        showError('Whoops! It looks like you forgot to add your email');
        return;
      }
      if (!isValidEmail(val)) {
        showError('Please provide a valid email address');
        return;
      }

      clearError();
      emailInput.value = '';
      alert('Thanks! You will be notified when we launch.');
    });

    emailInput.addEventListener('input', () => {
      if (emailInput.classList.contains('error')) clearError();
    });
  </script>
